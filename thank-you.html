<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Confirmed | JAX: The Sentinel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/gsap@3.12.5/all.min.js"></script>
    <style>
        .thank-you-hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .mission-log {
            background: rgba(8, 9, 10, 0.9);
            border: 1px solid var(--accent-color);
            padding: 4rem 3rem;
            border-radius: 20px;
            max-width: 700px;
            width: 90%;
            backdrop-filter: blur(30px);
            box-shadow: 0 0 100px rgba(0, 255, 157, 0.15), inset 0 0 20px rgba(0, 255, 157, 0.1);
            position: relative;
            z-index: 2;
        }
        .voice-wave {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin: 3rem 0;
            height: 60px;
            align-items: center;
        }
        .wave-bar {
            width: 5px;
            background: linear-gradient(to top, var(--accent-color), var(--accent-secondary));
            border-radius: 10px;
            height: 10px;
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .pulse { animation: wave 1.2s infinite ease-in-out; }
        @keyframes wave {
            0%, 100% { height: 10px; opacity: 0.5; }
            50% { height: 60px; opacity: 1; }
        }
        .jax-msg {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-color);
            line-height: 1.6;
            font-size: 1.2rem;
            margin-bottom: 3rem;
            letter-spacing: 0.5px;
        }
        .jax-msg .accent {
            color: var(--accent-color);
            font-weight: 700;
        }
    </style>
</head>
<body class="cipher-mode">
    <div class="noise-overlay"></div>
    <div class="scanline"></div>

    <main class="thank-you-hero">
        <div class="logo-bg" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.05; width: 80%; pointer-events: none;">
            <img src="logo.png" alt="" style="width: 100%;">
        </div>
        <div class="container mission-log animate-in">
            <div class="pill">MISSION INITIALIZED // PHASE-01</div>
            <h1 class="hero-title"><span class="accent">HERO</span> DEPLOYED.</h1>
            
            <div class="voice-wave" id="voice-wave">
                <div class="wave-bar pulse" style="animation-delay: 0s"></div>
                <div class="wave-bar pulse" style="animation-delay: 0.1s"></div>
                <div class="wave-bar pulse" style="animation-delay: 0.2s"></div>
                <div class="wave-bar pulse" style="animation-delay: 0.3s"></div>
                <div class="wave-bar pulse" style="animation-delay: 0.4s"></div>
                <div class="wave-bar pulse" style="animation-delay: 0.5s"></div>
                <div class="wave-bar pulse" style="animation-delay: 0.6s"></div>
                <div class="wave-bar pulse" style="animation-delay: 0.7s"></div>
                <div class="wave-bar pulse" style="animation-delay: 0.8s"></div>
                <div class="wave-bar pulse" style="animation-delay: 0.9s"></div>
            </div>

            <p class="jax-msg" id="jax-message">
                "Acknowledged. Mission parameters initialized for <span id="user-name" class="accent">...</span>. My hunters are already scanning the Bakersfield market for your revenue ghosts. High-conversion audit results incoming to your device."
            </p>

            <a href="index.html" class="btn btn-primary">RETURN TO COMMAND CENTER</a>
        </div>
    </main>

    <script>
        lucide.createIcons();
        gsap.to('.animate-in', { opacity: 1, y: 0, duration: 1, ease: 'power3.out' });

        // Update name from URL params
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name') || 'the mission';
        document.getElementById('user-name').innerText = name;

        // Auto-speak simulation (Visual only, simulate voice with wave)
        setTimeout(() => {
            // Optional: browser speech synthesis
            try {
                const msg = new SpeechSynthesisUtterance(`Hero Protocol active. Initializing mission parameters for ${name}. My hunters are already scanning for your ghosts. High-conversion audit results is incoming.`);
                msg.pitch = 0.5; // Deeper voice but still robotic
                msg.rate = 1.1; // Faster
                window.speechSynthesis.speak(msg);
            } catch (e) {
                console.log('Speech failed or not supported');
            }
        }, 800);
    </script>
</body>
</html>
